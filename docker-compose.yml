services:
  postgres:
    image: postgres:17
    container_name: router-postgres
    environment:
      POSTGRES_USER: router
      POSTGRES_PASSWORD: router
      POSTGRES_DB: router
    ports:
      - "5432:5432"
    volumes:
      - router-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U router -d router"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  router-postgres-data:
